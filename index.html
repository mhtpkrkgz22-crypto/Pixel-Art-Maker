<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Art Maker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>PIXEL ART MAKER</h1>

      <div class="container">
        <div class="grid-container"></div>
        <img
          class="bear-image"
          src="images/cutecontainer.png"
          alt="Big Bear Image"
        />

        <div class="buttons">
          <button class="btn paint-btn">PAINT</button>
          <button class="btn rainbow-btn">RAINBOW</button>
          <button class="btn eraser-btn">ERASER</button>
          <button class="btn clear-btn">CLEAR</button>
          <button class="btn hide-btn">HIDE GRID</button>
          <div class="color-palette-container">
            <input
              type="color"
              value="#b92dad"
              id="colorPicker"
              title="Color Palette"
            />
          </div>
          <input id="slider" type="range" min="1" max="50" value="16" />
          <p class="grid-value">16 x 16</p>
        </div>
      </div>
    </div>
    <footer>
      Copyright ©
      <span class="year"></span>
      |
      <a href="https://github.com/mhtpkrkgz22-crypto" target="_blank"
        >Mehtap Kırkgöz <img class="github-logo" src="images/githublogo.png"
      /></a>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
