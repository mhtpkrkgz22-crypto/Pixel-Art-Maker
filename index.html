<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Art Maker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>PİXEL ART MAKER</h1>

      <div class="container">
        <div class="middle-place"></div>
        <img
          class="bear-image"
          src="images/cutecontainer.png"
          alt="Big Bear Image"
        />

        <div class="buttons">
          <button class="btn">PAINT</button>
          <button class="btn">RAINBOW</button>
          <button class="btn">ERASER</button>
          <button class="btn">CLEAR</button>
          <button class="btn">HIDE GRID</button>
          <input class="slider" type="range" min="1" max="100" value="16" />
        </div>
      </div>
      <div class="color-palette-container">
        <input
          type="color"
          id="colorPicker"
          class="color-picker"
          title="Color Palette"
        />
      </div>
    </div>
  </body>

</html>
